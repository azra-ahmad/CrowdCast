{% extends "base.html" %}
{% block title %}Daftar — NetVault{% endblock %}

{% block body %}
<section class="container auth-wrap reveal">
  <div class="card">
    <h1 class="display">Buat akun</h1>
    <p class="card-sub">Daftar untuk mengakses upload &amp; streaming.</p>
    <form method="POST" action="{{ url_for('register') }}">
      <div class="field">
        <label for="username">username</label>
        <input type="text" id="username" name="username" value="{{ form.username or '' }}"
               maxlength="20" autocomplete="username" required autofocus>
      </div>
      <div class="field">
        <label for="email">email</label>
        <input type="email" id="email" name="email" value="{{ form.email or '' }}"
               autocomplete="email" required>
      </div>
      <div class="field">
        <label for="password">password</label>
        <input type="password" id="password" name="password" autocomplete="new-password" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block">Daftar &amp; kirim OTP</button>
    </form>
    <p class="auth-alt">Sudah punya akun? <a href="{{ url_for('login') }}">Masuk</a></p>
  </div>
</section>
{% endblock %}
