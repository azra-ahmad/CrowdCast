{% extends "base.html" %}
{% block title %}Daftar — CrowdCast{% endblock %}

{% block body %}
<div class="wrap auth-top">
  <a class="logo" href="{{ url_for('index') }}">
    <img class="mk" src="{{ url_for('static', filename='img/CrowdCast.png') }}" alt="CrowdCast" style="width:28px;height:28px">
    <span class="wm">CrowdCast</span>
  </a>
</div>

<div class="wrap auth-narrow">
  <div class="card">
    <h2>Buat akun</h2>
    <p class="sub">Daftar buat ikut chat &amp; ganti siaran.</p>
    <form method="POST" action="{{ url_for('register') }}">
      <div class="fld"><label class="lbl" for="username">Username</label>
        <input id="username" name="username" value="{{ form.username or '' }}" maxlength="20" autocomplete="username" required autofocus></div>
      <div class="fld"><label class="lbl" for="email">Email</label>
        <input id="email" name="email" type="email" value="{{ form.email or '' }}" autocomplete="email" required></div>
      <div class="fld"><label class="lbl" for="password">Password</label>
        <input id="password" name="password" type="password" autocomplete="new-password" required></div>
      <button class="btn btn-red btn-block" type="submit">Daftar &amp; kirim OTP</button>
    </form>
    <div class="alt">Sudah punya akun? <a href="{{ url_for('login') }}">Masuk</a></div>
  </div>
</div>
{% endblock %}
