<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}CrowdCast{% endblock %}</title>
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='img/CrowdCast.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}?v={{ asset_v }}">
</head>
<body>
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flashes">
        {% for category, message in messages %}
          <div class="flash {{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  {% block body %}{% endblock %}

  <script src="{{ url_for('static', filename='js/main.js') }}?v={{ asset_v }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
