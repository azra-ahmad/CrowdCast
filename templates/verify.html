{% extends "base.html" %}
{% block title %}Verifikasi — CrowdCast{% endblock %}

{% block body %}
<div class="wrap auth-top">
  <a class="logo" href="{{ url_for('index') }}">
    <img class="mk" src="{{ url_for('static', filename='img/CrowdCast.png') }}" alt="CrowdCast" style="width:28px;height:28px">
    <span class="wm">CrowdCast</span>
  </a>
</div>

<div class="wrap auth-narrow">
  <div class="card">
    <h2>Verifikasi email</h2>
    <p class="sub">Kode 6 digit dikirim ke <b style="color:var(--text2)">{{ email }}</b>.</p>
    <form method="POST" action="{{ url_for('verify') }}">
      <div class="fld"><label class="lbl" for="code">Kode OTP</label>
        <input id="code" name="code" class="otp-input" maxlength="6" inputmode="numeric" pattern="[0-9]*" autocomplete="one-time-code" required autofocus></div>
      <button class="btn btn-red btn-block" type="submit">Verifikasi</button>
    </form>
    <div class="alt">Tidak menerima kode? <a href="{{ url_for('resend_otp') }}">Kirim ulang</a></div>
  </div>
</div>
{% endblock %}
